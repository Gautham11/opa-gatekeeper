apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sallowedrepos
  annotations:
    description: >-
      Requires container images to begin with a string from a specified
      list of allowed prefixes (registries).
spec:
  crd:
    spec:
      names:
        kind: K8sAllowedRepos
      validation:
        openAPIV3Schema:
          type: object
          properties:
            repos:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sallowedrepos

        violation[{"msg": msg}] {
          container := input.review.object.spec.containers[_]
          satisfied := [good |
            repo := input.parameters.repos[_]
            good := startswith(container.image, repo)
          ]
          not any(satisfied)
          msg := sprintf(
            "container <%v> uses disallowed image <%v>; allowed prefixes: %v",
            [container.name, container.image, input.parameters.repos]
          )
        }

        violation[{"msg": msg}] {
          container := input.review.object.spec.initContainers[_]
          satisfied := [good |
            repo := input.parameters.repos[_]
            good := startswith(container.image, repo)
          ]
          not any(satisfied)
          msg := sprintf(
            "init container <%v> uses disallowed image <%v>; allowed prefixes: %v",
            [container.name, container.image, input.parameters.repos]
          )
        }
